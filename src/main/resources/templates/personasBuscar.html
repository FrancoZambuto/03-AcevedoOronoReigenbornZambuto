<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{persona.buscar.titulo}"></title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="pagina-secundaria">
<div th:replace="~{fragments/nav :: volver}"></div>
<div th:replace="~{fragments/nav :: cabecera(titulo=#{persona.buscar.titulo})}"></div>
<main class="contenido contenido-ancho">
<section class="tarjeta">

<form th:action="@{/personasBuscar}" th:object="${formBean}" method="post">
    <div class="campo">
        <label th:text="#{persona.dniCuit}"></label>
        <input type="text" th:field="*{dniCuit}" />
    </div>
    <div class="campo">
        <label th:text="#{persona.nombre}"></label>
        <input type="text" th:field="*{nombre}" />
    </div>
    <div class="campo">
        <label th:text="#{persona.ciudad}"></label>
        <select th:field="*{ciudadSeleccionada}">
            <option value="">Todas</option>
            <option th:each="c : ${allCiudades}" th:value="${c.id}" th:text="${c.nombre}"></option>
        </select>
    </div>

    <div class="botones">
        <button type="submit" name="action" value="Buscar">Buscar</button>
        <button type="submit" name="action" value="Cancelar">Cancelar</button>
        <button type="submit" name="action" value="Registrar">Registrar</button>
    </div>

    <table class="tabla-datos resultados">
        <thead>
        <tr>
            <th th:text="#{persona.dniCuit}"></th>
            <th th:text="#{persona.nombre}"></th>
            <th th:text="#{persona.apellido}"></th>
            <th th:text="#{persona.telefono}"></th>
            <th th:text="#{persona.email}"></th>
            <th th:text="#{persona.domicilio}"></th>
            <th th:text="#{persona.ciudad}"></th>
            <th></th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${resultados}">
            <td th:text="${p.dniCuit}"></td>
            <td th:text="${p.nombre}"></td>
            <td th:text="${p.apellido}"></td>
            <td th:text="${p.telefono}"></td>
            <td th:text="${p.email}"></td>
            <td th:text="${p.domicilio}"></td>
            <td th:text="${p.ciudad == null ? '' : p.ciudad.nombre}"></td>
            <td class="acciones-fila">
                <a th:href="@{/personasEditar/{id}(id=${p.id})}" th:text="#{links.editar}">editar</a>
            </td>
            <td class="acciones-fila">
                <button type="submit" class="btn-eliminar"
                        th:formaction="@{/personasEditar/delete/{id}(id=${p.id})}"
                        formmethod="post"
                        th:text="#{links.eliminar}"
                        onclick="return confirm('Estas seguro que deseas eliminar esta persona?');">
                </button>
            </td>
        </tr>
        </tbody>
    </table>
</form>
</section>
</main>
</body>
</html>
