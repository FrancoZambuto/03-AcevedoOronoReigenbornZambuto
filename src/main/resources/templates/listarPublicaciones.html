<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<title th:text="#{publicacion.listado.titulo}">Listado de Publicaciones</title>
	<link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="pagina-secundaria">
	<div th:replace="~{fragments/nav :: volver}"></div>
	<div th:replace="~{fragments/nav :: cabecera(titulo=#{publicacion.listado.titulo})}"></div>

	<main class="contenido contenido-ancho">
		<section class="tarjeta">
			<p class="mensaje-exito" th:if="${mensajeExito}" th:text="#{publicacion.baja.exito}"></p>
			<p class="mensaje-exito" th:if="${mensajeEdicionExito}" th:text="#{publicacion.editar.exito}"></p>
			<p class="mensaje-error" th:if="${mensajeError}" th:text="${mensajeError}"></p>

			<form class="filtros" th:action="@{/publicacion/listado}" th:object="${filtro}" method="get">
				<div class="campo">
					<label for="propiedadId" th:text="#{publicacion.listado.propiedad}">Propiedad</label>
					<select id="propiedadId" th:field="*{propiedadId}">
						<option value="" th:text="#{publicacion.filtro.todos}"></option>
						<option th:each="p : ${allPropiedades}" th:value="${p.id}"
							th:text="${p.direccion + ' - ' + p.ciudad.nombre}"></option>
					</select>
				</div>

				<div class="campo">
					<label for="ciudadId" th:text="#{publicacion.listado.ciudad}">Ciudad</label>
					<select id="ciudadId" th:field="*{ciudadId}">
						<option value="" th:text="#{publicacion.filtro.todos}"></option>
						<option th:each="c : ${allCiudades}" th:value="${c.id}" th:text="${c.nombre}"></option>
					</select>
				</div>

				<div class="campo">
					<label for="estado" th:text="#{publicacion.listado.estado}">Estado</label>
					<select id="estado" th:field="*{estado}">
						<option value="" th:text="#{publicacion.filtro.todos}"></option>
						<option th:each="e : ${estadosPublicacion}" th:value="${e}" th:text="${e}"></option>
					</select>
				</div>

				<div class="campo">
					<label for="precioMin" th:text="#{publicacion.filtro.precioMin}">Precio minimo</label>
					<input type="number" step="0.01" min="0" id="precioMin" th:field="*{precioMin}"/>
				</div>

				<div class="campo">
					<label for="precioMax" th:text="#{publicacion.filtro.precioMax}">Precio maximo</label>
					<input type="number" step="0.01" min="0" id="precioMax" th:field="*{precioMax}"/>
				</div>

				<div class="botones">
					<button type="submit" th:text="#{publicacion.filtro.buscar}">Buscar</button>
					<a class="btn-secundario" th:href="@{/publicacion/listado}" th:text="#{publicacion.filtro.limpiar}">Limpiar</a>
					<a class="btn-secundario" th:href="@{/publicacion/alta}" th:text="#{publicacion.listado.nueva}">Nueva publicacion</a>
				</div>
			</form>

			<table class="tabla-datos">
				<thead>
					<tr>
						<th th:text="#{publicacion.listado.id}">Id</th>
						<th th:text="#{publicacion.listado.propiedad}">Propiedad</th>
						<th th:text="#{publicacion.listado.ciudad}">Ciudad</th>
						<th th:text="#{publicacion.listado.precioMensual}">Precio mensual</th>
						<th th:text="#{publicacion.listado.fechaPublicacion}">Fecha de publicacion</th>
						<th th:text="#{publicacion.listado.estado}">Estado</th>
						<th th:text="#{publicacion.listado.acciones}">Acciones</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="pub : ${publicaciones}">
						<td th:text="${pub.id}"></td>
						<td th:text="${pub.propiedad.direccion}"></td>
						<td th:text="${pub.propiedad.ciudad.nombre}"></td>
						<td th:text="${pub.precioMensual}"></td>
						<td th:text="${pub.fechaPublicacion}"></td>
						<td th:text="${pub.estado}"></td>
						<td class="acciones-fila">
							<a th:href="@{/publicacion/{id}/editar(id=${pub.id})}" th:text="#{publicacion.listado.modificar}">Modificar</a>
							<form th:action="@{/publicacion/{id}/eliminar(id=${pub.id})}" method="post">
								<button type="submit" class="btn-eliminar" th:text="#{publicacion.baja.boton}">Eliminar</button>
							</form>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(publicaciones)}">
						<td colspan="7">No hay publicaciones registradas.</td>
					</tr>
				</tbody>
			</table>
		</section>
	</main>
</body>
</html>
