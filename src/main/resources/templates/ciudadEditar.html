<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${formBean.id} ? #{ciudad.editar.titulo} : #{ciudad.registrar.titulo}"></title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="pagina-secundaria">
<div th:replace="~{fragments/nav :: volver}"></div>
<header class="encabezado encabezado-compacto">
    <h1 th:text="#{home.titulo}">HogarYA</h1>
    <p class="subtitulo" th:text="${formBean.id} ? #{ciudad.editar.titulo} : #{ciudad.registrar.titulo}"></p>
</header>
<main class="contenido contenido-ancho">
<section class="tarjeta">

<form th:action="@{/ciudadEditar}" th:object="${formBean}" method="post">
    <p th:each="err : ${#fields.errors('global')}" th:text="${err}" class="error" />
    <input type="hidden" id="id" th:field="*{id}">
    <div class="campo">
        <label th:text="#{ciudad.nombre}"></label>
        <input type="text" th:field="*{nombre}" />
        <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
    </div>
    <div class="campo">
        <label th:text="#{ciudad.provincia}"></label>
        <select th:field="*{idProvincia}">
            <option th:each="p : ${allProvincias}" th:value="${p.id}" th:text="${p.nombre}"></option>
        </select>
    </div>
    <div class="botones">
        <button type="submit" name="action" value="actionAceptar" th:text="#{botones.aceptar}"></button>
        <button type="submit" name="action" value="actionCancelar" th:text="#{botones.cancelar}"></button>
    </div>
</form>
</section>
</main>
</body>
</html>
