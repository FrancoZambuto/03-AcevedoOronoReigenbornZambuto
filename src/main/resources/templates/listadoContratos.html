<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<title th:text="#{contrato.listado.titulo}">Listado de Contratos</title>
	<link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="pagina-secundaria">
	<div th:replace="~{fragments/nav :: volver}"></div>
	<div th:replace="~{fragments/nav :: cabecera(titulo=#{contrato.listado.titulo})}"></div>

	<main class="contenido contenido-ancho">
		<section class="tarjeta">
			<p th:if="${mensajeExito}" class="mensaje-exito" th:text="#{contrato.baja.exito}"></p>
			<p th:if="${mensajeError}" class="mensaje-error" th:text="${mensajeError}"></p>

			<form class="filtros" th:action="@{/contrato/listado}" method="get">
				<div class="campo">
					<label for="propiedadId" th:text="#{contrato.propiedad}">Propiedad</label>
					<select id="propiedadId" name="propiedadId">
						<option value="" th:text="#{contrato.filtro.todos}">Todas</option>
						<option th:each="p : ${allPropiedades}" th:value="${p.id}"
							th:text="${p.direccion + ' - ' + p.ciudad.nombre}"
							th:selected="${propiedadIdFiltro == p.id}"></option>
					</select>
				</div>

				<div class="campo">
					<label for="inquilinoId" th:text="#{contrato.inquilino}">Inquilino</label>
					<select id="inquilinoId" name="inquilinoId">
						<option value="" th:text="#{contrato.filtro.todos}">Todos</option>
						<option th:each="i : ${allInquilinos}" th:value="${i.id}"
							th:text="${i.apellido + ', ' + i.nombre}"
							th:selected="${inquilinoIdFiltro == i.id}"></option>
					</select>
				</div>

				<div class="campo">
					<label for="estado" th:text="#{contrato.estado}">Estado</label>
					<select id="estado" name="estado">
						<option value="" th:text="#{contrato.filtro.todos}">Todos</option>
						<option th:each="e : ${estadosContrato}" th:value="${e}" th:text="${e}"
							th:selected="${estadoFiltro == e}"></option>
					</select>
				</div>

				<div class="campo">
					<label for="fechaInicio" th:text="#{contrato.fechaInicio}">Fecha de inicio</label>
					<input type="date" id="fechaInicio" name="fechaInicio" th:value="${fechaInicioFiltro}"/>
				</div>

				<div class="botones">
					<button type="submit" th:text="#{contrato.filtro.buscar}">Filtrar</button>
					<a class="btn-secundario" th:href="@{/contrato/listado}" th:text="#{contrato.filtro.limpiar}">Limpiar</a>
					<a class="btn-secundario" th:href="@{/contrato/alta}" th:text="#{contrato.listado.nuevo}">Nuevo Contrato</a>
				</div>
			</form>

			<p th:if="${contratos.isEmpty()}">No hay contratos registrados</p>

			<table class="tabla-datos" th:unless="${contratos.isEmpty()}">
				<thead>
					<tr>
						<th>ID</th>
						<th th:text="#{contrato.propiedad}">Propiedad</th>
						<th th:text="#{propiedad.propietario}">Propietario</th>
						<th th:text="#{contrato.inquilino}">Inquilino</th>
						<th th:text="#{contrato.fechaInicio}">Fecha Inicio</th>
						<th th:text="#{contrato.importeMensual}">Importe Mensual</th>
						<th th:text="#{contrato.diaVencimientoMensual}">Dia Vencimiento</th>
						<th th:text="#{contrato.estado}">Estado</th>
						<th th:text="#{propiedad.listado.acciones}">Acciones</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="contrato : ${contratos}">
						<td th:text="${contrato.id}"></td>
						<td th:text="${contrato.propiedad.direccion + ' - ' + contrato.propiedad.ciudad.nombre}"></td>
						<td th:text="${contrato.propiedad.propietario.apellido + ', ' + contrato.propiedad.propietario.nombre}"></td>
						<td th:text="${contrato.inquilino.apellido + ', ' + contrato.inquilino.nombre}"></td>
						<td th:text="${#temporals.format(contrato.fechaInicio, 'dd/MM/yyyy')}"></td>
						<td th:text="${#numbers.formatDecimal(contrato.importeMensual, 1, 2)}"></td>
						<td th:text="${contrato.diaVencimientoMensual}"></td>
						<td th:text="${contrato.estado}"></td>
						<td class="acciones-fila">
							<a th:href="@{/contrato/{id}/editar(id=${contrato.id})}">Modificar</a>
							<form th:action="@{/contrato/{id}/eliminar(id=${contrato.id})}" method="post">
								<button type="submit" class="btn-eliminar">Eliminar</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</section>
	</main>
</body>
</html>
