<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<title th:text="#{publicacion.editar.titulo}">Modificar Publicacion</title>
	<link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="pagina-secundaria">
	<div th:replace="~{fragments/nav :: volver}"></div>
	<div th:replace="~{fragments/nav :: cabecera(titulo=#{publicacion.editar.titulo})}"></div>
	<main class="contenido contenido-ancho">
		<section class="tarjeta">
	<p th:if="${mensajeExito}" class="mensaje-exito" th:text="#{publicacion.editar.exito}"></p>

	<form th:action="@{/publicacion/{id}/editar(id=${publicacionId})}"
		  th:object="${publicacionForm}" method="post">

		<div class="campo">
			<label th:text="#{publicacion.id}">Id</label>
			<span class="solo-lectura" th:text="${publicacionId}"></span>
		</div>

		<div class="campo">
			<label th:text="#{publicacion.propiedad}">Propiedad</label>
			<span class="solo-lectura"
				th:text="${publicacion.propiedad.direccion + ' - ' + publicacion.propiedad.ciudad.nombre}">
			</span>
			<input type="hidden" th:field="*{propiedadId}"/>
		</div>

		<div class="campo">
			<label for="precioMensual" th:text="#{publicacion.precioMensual}">Precio mensual</label>
			<input type="number" step="0.01" min="0.01" id="precioMensual" th:field="*{precioMensual}"/>
			<span th:if="${#fields.hasErrors('precioMensual')}" th:errors="*{precioMensual}"></span>
		</div>

		<div class="campo">
			<label for="condiciones" th:text="#{publicacion.condiciones}">Condiciones de alquiler</label>
			<textarea id="condiciones" th:field="*{condiciones}" rows="4" cols="50"></textarea>
			<span th:if="${#fields.hasErrors('condiciones')}" th:errors="*{condiciones}"></span>
		</div>

		<div class="campo">
			<label for="descripcion" th:text="#{publicacion.descripcion}">Descripcion</label>
			<textarea id="descripcion" th:field="*{descripcion}" rows="4" cols="50"></textarea>
			<span th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></span>
		</div>

		<div class="campo">
			<label for="fechaPublicacion" th:text="#{publicacion.fechaPublicacion}">Fecha de publicacion</label>
			<input type="date" id="fechaPublicacion" th:field="*{fechaPublicacion}"/>
			<span th:if="${#fields.hasErrors('fechaPublicacion')}" th:errors="*{fechaPublicacion}"></span>
		</div>

		<div class="campo">
			<label for="estado" th:text="#{publicacion.estado}">Estado</label>
			<select id="estado" th:field="*{estado}">
				<option th:each="e : ${estadosPublicacion}" th:value="${e}" th:text="${e}"></option>
			</select>
			<span th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></span>
		</div>

		<div th:if="${#fields.hasGlobalErrors()}">
			<p th:each="e : ${#fields.globalErrors()}" th:text="${e}"></p>
		</div>

		<button type="submit" th:text="#{publicacion.editar.submit}">Guardar cambios</button>
	</form>

	<p><a class="btn-secundario" th:href="@{/publicacion/listado}" th:text="#{publicacion.editar.volver}">Volver al listado</a></p>
		</section>
	</main>
</body>
</html>
