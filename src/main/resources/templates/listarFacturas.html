<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<title th:text="#{factura.listado.titulo}">Listado de Facturas</title>
	<link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="pagina-secundaria">
	<div th:replace="~{fragments/nav :: volver}"></div>
	<div th:replace="~{fragments/nav :: cabecera(titulo=#{factura.listado.titulo})}"></div>

	<main class="contenido contenido-ancho">
		<section class="tarjeta">
			<p th:if="${mensajeExito}" class="mensaje-exito" th:text="${mensajeExito}"></p>
			<p th:if="${mensajeError}" class="mensaje-error" th:text="${mensajeError}"></p>

			<form class="filtros" th:action="@{/factura/listado}" th:object="${filtro}" method="get">
				<div class="campo">
					<label for="estado">Estado</label>
					<select id="estado" th:field="*{estado}">
						<option value="" th:text="#{factura.filtro.todos}"></option>
						<option th:each="e : ${estadosFactura}" th:value="${e}" th:text="${e}"></option>
					</select>
				</div>

				<div class="campo">
					<label for="contratoId">Contrato</label>
					<select id="contratoId" th:field="*{contratoId}">
						<option value="" th:text="#{factura.filtro.todos}"></option>
						<option th:each="c : ${contratos}" th:value="${c.id}" th:text="${'Contrato #' + c.id}"></option>
					</select>
				</div>

				<div class="campo">
					<label for="propiedadId">Propiedad</label>
					<select id="propiedadId" th:field="*{propiedadId}">
						<option value="" th:text="#{factura.filtro.todas}"></option>
						<option th:each="p : ${propiedades}" th:value="${p.id}" th:text="${p.direccion}"></option>
					</select>
				</div>

				<div class="campo">
					<label for="inquilinoId">Inquilino</label>
					<select id="inquilinoId" th:field="*{inquilinoId}">
						<option value="" th:text="#{factura.filtro.todos}"></option>
						<option th:each="i : ${inquilinos}" th:value="${i.id}" th:text="${i.apellido + ', ' + i.nombre}"></option>
					</select>
				</div>

				<div class="campo">
					<label for="fechaDesde">Vencimiento desde</label>
					<input type="date" id="fechaDesde" th:field="*{fechaDesde}"/>
				</div>

				<div class="campo">
					<label for="fechaHasta">Vencimiento hasta</label>
					<input type="date" id="fechaHasta" th:field="*{fechaHasta}"/>
				</div>

				<div class="botones">
					<button type="submit" th:text="#{factura.filtro.buscar}">Filtrar</button>
					<a class="btn-secundario" th:href="@{/factura/listado}" th:text="#{factura.filtro.limpiar}">Limpiar</a>
					<a class="btn-secundario" th:href="@{/factura/alta}" th:text="#{factura.listado.nueva}">Nueva Factura</a>
				</div>
			</form>

			<table class="tabla-datos">
				<thead>
					<tr>
						<th>ID</th>
						<th>Contrato</th>
						<th>Propiedad</th>
						<th>Inquilino</th>
						<th>Fecha Emision</th>
						<th>Fecha Vencimiento</th>
						<th>Importe</th>
						<th>Estado</th>
						<th>Acciones</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="factura : ${facturas}">
						<td th:text="${factura.id}"></td>
						<td th:text="${factura.contrato.id}"></td>
						<td th:text="${factura.contrato.propiedad.direccion}"></td>
						<td th:text="${factura.contrato.inquilino.apellido + ', ' + factura.contrato.inquilino.nombre}"></td>
						<td th:text="${factura.fechaEmision}"></td>
						<td th:text="${factura.fechaVencimiento}"></td>
						<td th:text="${factura.importe}"></td>
						<td th:text="${factura.estado}"></td>
						<td class="acciones-fila">
							<a th:href="@{/factura/{id}/editar(id=${factura.id})}" th:text="#{factura.listado.modificar}">Modificar</a>
							<form th:action="@{/factura/{id}/eliminar(id=${factura.id})}" method="post">
								<button type="submit" class="btn-eliminar" th:text="#{factura.listado.eliminar}">Eliminar</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</section>
	</main>
</body>
</html>
