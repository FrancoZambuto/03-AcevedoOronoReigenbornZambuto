<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Listado de Facturas</title>
</head>
<body>

<h1>Listado de Facturas</h1>

<form th:action="@{/factura/listado}"
      th:object="${filtro}"
      method="get">

    <label>Estado:</label>

    <select th:field="*{estado}">
        <option value="">Todos</option>
        <option th:each="e : ${estadosFactura}"
                th:value="${e}"
                th:text="${e}">
        </option>
    </select>

    <label>Contrato:</label>

    <select th:field="*{contratoId}">
        <option value="">Todos</option>
        <option th:each="c : ${contratos}"
                th:value="${c.id}"
                th:text="${'Contrato #' + c.id}">
        </option>
    </select>

	<label>Propiedad:</label>

	<select th:field="*{propiedadId}">
	    <option value="">Todas</option>

	    <option th:each="p : ${propiedades}"
	            th:value="${p.id}"
	            th:text="${p.direccion}">
	    </option>
	</select>

	<label>Inquilino:</label>

	<select th:field="*{inquilinoId}">
	    <option value="">Todos</option>

	    <option th:each="i : ${inquilinos}"
	            th:value="${i.id}"
	            th:text="${i.apellido + ', ' + i.nombre}">
	    </option>
	</select>
	
	<label>Vencimiento desde:</label>

	<input type="date"
	       th:field="*{fechaDesde}"/>

	<label>Vencimiento hasta:</label>

	<input type="date"
	       th:field="*{fechaHasta}"/>
	
	<button type="submit">
	    Filtrar
	</button>

</form>

<br>

<table border="1">

    <thead>
    <tr>
        <th>ID</th>
        <th>Contrato</th>
        <th>Propiedad</th>
        <th>Inquilino</th>
        <th>Fecha Emisión</th>
        <th>Fecha Vencimiento</th>
        <th>Importe</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="factura : ${facturas}">

        <td th:text="${factura.id}"></td>

        <td th:text="${factura.contrato.id}"></td>

        <td th:text="${factura.contrato.propiedad.direccion}"></td>

        <td th:text="${factura.contrato.inquilino.apellido + ', ' + factura.contrato.inquilino.nombre}"></td>

        <td th:text="${factura.fechaEmision}"></td>

        <td th:text="${factura.fechaVencimiento}"></td>

        <td th:text="${factura.importe}"></td>

        <td th:text="${factura.estado}"></td>

        <td>

            <a th:href="@{/factura/{id}/editar(id=${factura.id})}">
                Editar
            </a>

            |

            <form th:action="@{/factura/{id}/eliminar(id=${factura.id})}"
                  method="post"
                  style="display:inline;">

                <button type="submit">
                    Eliminar
                </button>

            </form>

        </td>

    </tr>

    </tbody>

</table>

</body>
</html>
