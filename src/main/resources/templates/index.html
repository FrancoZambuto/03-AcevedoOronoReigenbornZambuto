<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<title th:text="#{home.titulo}">HogarYA</title>
	<link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="pagina-inicio">
	<header class="encabezado">
		<h1 th:text="#{home.titulo}">HogarYA</h1>
		<p class="subtitulo" th:text="#{home.subtitulo}">Sistema de gestion inmobiliaria</p>
	</header>

	<main class="contenido">
		<section class="bienvenida">
			<h2 th:text="#{home.bienvenida.titulo}">Bienvenido</h2>
			<p th:text="#{home.bienvenida.texto}">Seleccione una seccion para continuar.</p>
		</section>

		<nav class="menu-navegacion" aria-label="Menu principal">
			<h2 class="menu-titulo" th:text="#{home.menu.titulo}">Navegacion</h2>
			<ul class="menu-lista">
				<li>
					<a class="menu-enlace" th:href="@{/provinciasBuscar}" th:text="#{home.menu.provincias}">
						Listado de Provincias
					</a>
				</li>
				<li>
					<a class="menu-enlace" th:href="@{/ciudadesBuscar}" th:text="#{home.menu.ciudades}">
						Listado de Ciudades
					</a>
				</li>
				<li>
					<a class="menu-enlace" th:href="@{/personasBuscar}" th:text="#{home.menu.personas}">
						Listado de Personas
					</a>
				</li>
				<li>
					<a class="menu-enlace" th:href="@{/propiedad/listado}" th:text="#{home.menu.propiedades}">
						Listado de Propiedades
					</a>
				</li>
				<li>
					<a class="menu-enlace" th:href="@{/contrato/listado}" th:text="#{home.menu.contratos}">
						Listado de Contratos
					</a>
				</li>
				<li>
				    <a class="menu-enlace" th:href="@{/factura/listado}" th:text="#{home.menu.facturas}">
				        Listado de Facturas
				    </a>
				</li>
				<li>
					<a class="menu-enlace" th:href="@{/publicacion/listado}" th:text="#{home.menu.publicaciones}">
						Listado de Publicaciones
					</a>
				</li>
			</ul>
		</nav>
	</main>
</body>
</html>
