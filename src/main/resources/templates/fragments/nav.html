<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

	</div>

	<header th:fragment="cabecera (titulo)" class="encabezado encabezado-compacto">

		<p class="subtitulo" th:text="${titulo}"></p>
	</header>
</body>
</html>
