<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{ciudad.buscar.titulo}"></title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="pagina-secundaria">
<div th:replace="~{fragments/nav :: volver}"></div>
<div th:replace="~{fragments/nav :: cabecera(titulo=#{ciudad.buscar.titulo})}"></div>
<main class="contenido contenido-ancho">
<section class="tarjeta">

<form th:action="@{/ciudadesBuscar}" th:object="${formBean}" method="post">
    <p th:each="err : ${#fields.errors('global')}" th:text="${err}" class="error" />
    <div class="campo">
        <label th:text="#{ciudad.nombre}"></label>
        <input type="text" th:field="*{nombre}" />
    </div>
    <div class="campo">
        <label th:text="#{ciudad.provincia}"></label>
        <select th:field="*{provinciaSeleccionada}">
            <option th:value="null" text="Seleccione una opcion"></option>
            <option th:each="p : ${allProvincias}" th:value="${p.id}" th:text="${p.nombre}"></option>
        </select>
    </div>

    <div class="botones">
        <button type="submit" name="action" value="actionBuscar" th:text="#{botones.buscar}"></button>
        <button type="submit" name="action" value="actionCancelar" th:text="#{botones.cancelar}"></button>
        <button type="submit" name="action" value="actionRegistrar" th:text="#{botones.registrar}"></button>
    </div>

    <table class="tabla-datos resultados">
        <thead>
        <tr>
            <th th:text="#{ciudad.nombre}"></th>
            <th th:text="#{ciudad.provincia}"></th>
            <th></th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${resultados}">
            <td th:text="${p.nombre}"></td>
            <td th:text="${p.provincia.nombre}"></td>
            <td class="acciones-fila">
                <a th:href="@{/ciudadEditar/{id}(id=${p.id})}" th:text="#{links.editar}"></a>
            </td>
            <td class="acciones-fila">
                <button type="submit" class="btn-eliminar"
                        th:formaction="@{/ciudadEditar/delete/{id}(id=${p.id})}"
                        formmethod="post"
                        th:text="#{links.eliminar}"
                        onclick="return confirm('Estas seguro que deseas eliminar esta ciudad?');">
                </button>
            </td>
        </tr>
        </tbody>
    </table>
</form>
</section>
</main>
</body>
</html>
