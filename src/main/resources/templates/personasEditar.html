<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${formBean.id} ? #{persona.editar.titulo} : #{persona.registrar.titulo}"></title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="pagina-secundaria">
<div th:replace="~{fragments/nav :: volver}"></div>
<header class="encabezado encabezado-compacto">
    <h1 th:text="#{home.titulo}">HogarYA</h1>
    <p class="subtitulo" th:text="${formBean.id} ? #{persona.editar.titulo} : #{persona.registrar.titulo}"></p>
</header>
<main class="contenido contenido-ancho">
<section class="tarjeta">

<form th:action="@{/personasEditar}" th:object="${formBean}" method="post">
    <p th:each="err : ${#fields.errors('global')}" th:text="${err}" class="error"></p>
    <input type="hidden" th:field="*{id}">

    <div class="campo">
        <label th:text="#{persona.dniCuit}"></label>
        <input type="text" th:field="*{dniCuit}" maxlength="11" />
        <span th:if="${#fields.hasErrors('dniCuit')}" th:errors="*{dniCuit}"></span>
    </div>
    <div class="campo">
        <label th:text="#{persona.nombre}"></label>
        <input type="text" th:field="*{nombre}" />
        <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
    </div>
    <div class="campo">
        <label th:text="#{persona.apellido}"></label>
        <input type="text" th:field="*{apellido}" />
        <span th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></span>
    </div>
    <div class="campo">
        <label th:text="#{persona.telefono}"></label>
        <input type="tel" th:field="*{telefono}" />
        <span th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></span>
    </div>
    <div class="campo">
        <label th:text="#{persona.email}"></label>
        <input type="email" th:field="*{email}" />
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </div>
    <div class="campo">
        <label th:text="#{persona.domicilio}"></label>
        <input type="text" th:field="*{domicilio}" />
        <span th:if="${#fields.hasErrors('domicilio')}" th:errors="*{domicilio}"></span>
    </div>
    <div class="campo">
        <label th:text="#{persona.ciudad}"></label>
        <select th:field="*{idCiudad}">
            <option value=""></option>
            <option th:each="c : ${allCiudades}" th:value="${c.id}" th:text="${c.nombre}"></option>
        </select>
        <span th:if="${#fields.hasErrors('idCiudad')}" th:errors="*{idCiudad}"></span>
    </div>

    <div class="botones">
        <button type="submit" name="action" value="Aceptar">Aceptar</button>
        <button type="submit" name="action" value="Cancelar">Cancelar</button>
    </div>
</form>
</section>
</main>
</body>
</html>
